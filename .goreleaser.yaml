version: 2

project_name: itonics

before:
  hooks:
    - go mod tidy

builds:
  - id: itonics
    main: ./
    binary: itonics
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/itonics/itonics-cli/cmd.Version={{.Version}}

archives:
  - id: itonics
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{- title .Os }}_{{- if eq .Arch "amd64" }}x86_64{{- else if eq .Arch "386" }}i386{{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request

brews:
  - name: itonics
    repository:
      owner: itonics
      name: itonics-cli
      branch: main
    directory: Formula
    homepage: https://github.com/itonics/itonics-cli
    description: Command-line client for the ITONICS Innovation OData v2 API
    license: MIT
    test: |
      assert_match "itonics", shell_output("#{bin}/itonics --help")
      assert_match "elements", shell_output("#{bin}/itonics --help")
    install: |
      bin.install "itonics"

scoops:
  - name: itonics
    repository:
      owner: itonics
      name: itonics-cli
      branch: main
    directory: scoop
    homepage: https://github.com/itonics/itonics-cli
    description: Command-line client for the ITONICS Innovation OData v2 API
    license: MIT
